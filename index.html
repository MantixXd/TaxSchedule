<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Schedule - Správa daní</title>
    <link rel="stylesheet" href="style.css?v=1.20.0">
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-box">
            <h1>Přihlášení - Tax Schedule</h1>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Uživatel" required>
                <input type="password" id="login-password" placeholder="Heslo" required>
                <button type="submit">Přihlásit se</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app-main-layout" style="display: none;">
        <header>
            <div class="header-content">
                <h1>Tax Schedule</h1>
                <div class="user-info">
                    <span id="user-display">Uživatel: ...</span>
                    <button id="logout-button">Odhlásit</button>
                </div>
            </div>
        </header>

        <div class="app-container">
            <aside class="sidebar left-sidebar">
                <section class="config-section card">
                    <h2>Údaje</h2>
                    <div class="params-vertical">
                        <div class="param-group">
                            <label for="param-members">Členové:</label>
                            <div class="stepper">
                                <button onclick="step('param-members', -1)">-</button>
                                <input type="number" id="param-members" step="1" min="0" value="0">
                                <button onclick="step('param-members', 1)">+</button>
                            </div>
                        </div>
                        <div class="param-group">
                            <label for="param-claims">Claimy:</label>
                            <div class="stepper">
                                <button onclick="step('param-claims', -1)">-</button>
                                <input type="number" id="param-claims" step="1" min="0" value="0">
                                <button onclick="step('param-claims', 1)">+</button>
                            </div>
                        </div>
                        <div class="param-group">
                            <label for="param-level">Level:</label>
                            <div class="stepper">
                                <button onclick="step('param-level', -1)">-</button>
                                <input type="number" id="param-level" step="1" min="0" value="0">
                                <button onclick="step('param-level', 1)">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="calc-result">
                        <small>K placení:</small>
                        <div id="tax-amount">0</div>
                    </div>
                    <button id="save-params" class="btn-block">Uložit</button>
                </section>

                <section class="rent-section card">
                    <h2>Týdenní nájem</h2>
                    <div class="calc-result">
                        <small>Na člena (týdně):</small>
                        <div id="rent-per-member">0</div>
                    </div>
                </section>
            </aside>

            <main class="content">
                <section class="calendar-section card">
                    <div class="calendar-header">
                        <h2>Rozpis placení</h2>
                        <div class="calendar-nav">
                            <button id="prev-month" class="nav-btn">&lt;</button>
                            <h3 id="current-month-year">...</h3>
                            <button id="next-month" class="nav-btn">&gt;</button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Kalendář bude vygenerován v JS -->
                    </div>
                </section>
            </main>

            <aside class="sidebar right-sidebar">
                <section class="payments-section card">
                    <div class="calendar-header" style="margin-bottom: 1rem;">
                        <h2>Evidence plateb</h2>
                        <div class="calendar-nav">
                            <button id="prev-week" class="nav-btn" style="width: 32px; height: 32px; font-size: 1rem;">&lt;</button>
                            <button id="next-week" class="nav-btn" style="width: 32px; height: 32px; font-size: 1rem;">&gt;</button>
                        </div>
                    </div>
                    
                    <div id="week-info">
                        <small>Týden:</small>
                        <div id="current-week-display" style="font-weight: bold; margin-bottom: 10px;">...</div>
                    </div>
                    
                    <div id="members-payment-list">
                        <!-- Seznam členů s checkboxy -->
                    </div>

                    <div id="admin-member-actions" style="display: none; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                        <div class="param-group">
                            <label>Nový člen:</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="text" id="new-member-name" placeholder="Jméno" style="flex-grow: 1; padding: 0.6rem;">
                                <button id="add-member-btn" style="width: 34px; height: 34px; font-size: 1.1rem;">+</button>
                            </div>
                        </div>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <script src="app.js?v=1.20.0"></script></script>

    <!-- Custom Modal for Confirmations -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modal-title">Potvrzení</h3>
            <p id="modal-message">Opravdu chcete provést tuto akci?</p>
            <div class="modal-actions">
                <button id="modal-cancel">Zrušit</button>
                <button id="modal-confirm" class="btn-primary">Potvrdit</button>
            </div>
        </div>
    </div>
</body>
</html>
