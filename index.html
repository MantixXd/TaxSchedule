<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Schedule</title>
    <link rel="stylesheet" href="style.css?v=2.1.10">
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-box">
            <h1>Přihlášení</h1>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Uživatel" required autocomplete="username">
                <input type="password" id="login-password" placeholder="Heslo" required autocomplete="current-password">
                <button type="submit">Přihlásit se</button>
                <p id="login-error" class="error-text" style="color: var(--error-color); margin-top: 1rem;"></p>
            </form>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="app-main-layout" style="display: none;">
        <header>
            <div class="header-content">
                <h1>Tax Schedule</h1>
                <div class="user-info">
                    <span id="user-display">...</span>
                    <button id="logout-button">Odhlásit</button>
                </div>
            </div>
        </header>

        <div class="app-container">
            <!-- LEFT: Settings -->
            <aside class="sidebar left-sidebar">
                <section class="card">
                    <h2>Údaje</h2>
                    <div class="param-group">
                        <label>Členové</label>
                        <div class="stepper">
                            <button onclick="step('param-members', -1)">-</button>
                            <input type="number" id="param-members" value="0">
                            <button onclick="step('param-members', 1)">+</button>
                        </div>
                    </div>
                    <div class="param-group">
                        <label>Claimy</label>
                        <div class="stepper">
                            <button onclick="step('param-claims', -1)">-</button>
                            <input type="number" id="param-claims" value="0">
                            <button onclick="step('param-claims', 1)">+</button>
                        </div>
                    </div>
                    <div class="param-group">
                        <label>Level</label>
                        <div class="stepper">
                            <button onclick="step('param-level', -1)">-</button>
                            <input type="number" id="param-level" value="0">
                            <button onclick="step('param-level', 1)">+</button>
                        </div>
                    </div>
                    <div class="calc-result">
                        <small>Celková daň (denně)</small>
                        <div id="tax-amount">0 $</div>
                    </div>
                    <button id="save-params" class="btn-block">Uložit nastavení</button>
                </section>

                <section class="card">
                    <h2>Týdenní nájem</h2>
                    <div class="calc-result">
                        <small>Na člena (týdně)</small>
                        <div id="rent-per-member">0 $</div>
                    </div>
                </section>
            </aside>

            <!-- CENTER: Calendar -->
            <main class="content">
                <section class="card">
                    <div class="calendar-header">
                        <h2>Rozpis placení</h2>
                        <div class="calendar-nav">
                            <button id="prev-month" class="nav-btn">&lt;</button>
                            <span id="current-month-year" style="font-weight: 700; min-width: 140px; text-align: center;">...</span>
                            <button id="next-month" class="nav-btn">&gt;</button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- JS content -->
                    </div>
                </section>
            </main>

            <!-- RIGHT: Payments -->
            <aside class="sidebar right-sidebar">
                <section class="card">
                    <div class="calendar-header">
                        <h2>Evidence plateb</h2>
                        <div class="calendar-nav">
                            <button id="prev-week" class="nav-btn">&lt;</button>
                            <button id="next-week" class="nav-btn">&gt;</button>
                        </div>
                    </div>
                    <div id="week-info" style="margin-bottom: 1rem;">
                        <small style="color: var(--text-muted); font-weight: 600;">TÝDEN:</small>
                        <div id="current-week-display" style="font-weight: 700; font-size: 1rem;">...</div>
                    </div>
                    
                    <div id="members-payment-list">
                        <!-- JS content -->
                    </div>

                    <div id="admin-member-actions" style="display: none; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                        <label style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">Nový člen:</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="new-member-name" placeholder="Jméno..." style="flex-grow: 1; background: #0f172a; border: 1px solid var(--border-color); border-radius: 8px; color: white; padding: 0.5rem;">
                            <button id="add-member-btn">+</button>
                        </div>
                        <button id="manage-members-btn" class="btn-block" style="background: rgba(148, 163, 184, 0.1); color: var(--text-muted); font-size: 0.8rem; border: 1px solid var(--border-color);">Správa členů</button>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <!-- Modals -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modal-title">Potvrzení</h3>
            <p id="modal-message" style="margin-top: 1rem; color: var(--text-muted);"></p>
            <div class="modal-actions">
                <button id="modal-cancel">Zrušit</button>
                <button id="modal-confirm" class="btn-primary">Potvrdit</button>
            </div>
        </div>
    </div>

    <div id="member-mgmt-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box" style="max-width: 500px;">
            <h2>Správa členů</h2>
            <div id="mgmt-member-list" style="max-height: 400px; overflow-y: auto; margin: 1.5rem 0; display: flex; flex-direction: column; gap: 0.5rem;"></div>
            <button id="close-mgmt-btn" class="btn-block" style="background: var(--border-color);">Zavřít</button>
        </div>
    </div>

    <script src="app.js?v=2.1.10"></script>
</body>
</html>
