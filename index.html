<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Schedule - Správa daní</title>
    <link rel="stylesheet" href="style.css?v=1.12.0">
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-box">
            <h1>Přihlášení - Tax Schedule</h1>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Uživatel" required>
                <input type="password" id="login-password" placeholder="Heslo" required>
                <button type="submit">Přihlásit se</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app-main-layout" style="display: none;">
        <header>
            <div class="header-content">
                <h1>Tax Schedule</h1>
                <div class="user-info">
                    <span id="user-display">Uživatel: ...</span>
                    <button id="logout-button">Odhlásit</button>
                </div>
            </div>
        </header>

        <div class="app-container">
            <aside class="sidebar">
                <section class="config-section card">
                    <h2>Údaje</h2>
                    <div class="params-vertical">
                        <div class="param-group">
                            <label for="param-members">Členové:</label>
                            <input type="number" id="param-members" step="1" min="0">
                        </div>
                        <div class="param-group">
                            <label for="param-claims">Claimy:</label>
                            <input type="number" id="param-claims" step="1" min="0">
                        </div>
                        <div class="param-group">
                            <label for="param-level">Level:</label>
                            <input type="number" id="param-level" step="1" min="0">
                        </div>
                    </div>
                    <div class="calc-result">
                        <small>K placení:</small>
                        <div id="tax-amount">0</div>
                    </div>
                    <button id="save-params" class="btn-block">Uložit</button>
                </section>

                <section class="rent-section card">
                    <h2>Měsíční nájem</h2>
                    <div class="calc-result">
                        <small>Na člena (týdně):</small>
                        <div id="rent-per-member">0</div>
                    </div>
                </section>
            </aside>

            <main class="content">
                <section class="calendar-section card">
                    <div class="calendar-header">
                        <h2>Rozpis placení</h2>
                        <div class="calendar-nav">
                            <button id="prev-month" class="nav-btn">&lt;</button>
                            <h3 id="current-month-year">...</h3>
                            <button id="next-month" class="nav-btn">&gt;</button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Kalendář bude vygenerován v JS -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="app.js?v=1.12.0"></script>

    <!-- Custom Modal for Confirmations -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modal-title">Potvrzení</h3>
            <p id="modal-message">Opravdu chcete provést tuto akci?</p>
            <div class="modal-actions">
                <button id="modal-cancel">Zrušit</button>
                <button id="modal-confirm" class="btn-primary">Potvrdit</button>
            </div>
        </div>
    </div>
</body>
</html>
